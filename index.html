<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Digital 4x4</title>
    <style>
        /* --- DISEÑO (CSS) --- */
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .tablero {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columnas exactas */
            gap: 12px;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 15px;
            border: 8px solid #c0392b;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 95%;
        }

        .carta {
            width: 100%;
            aspect-ratio: 2/3; /* Proporción de carta clásica */
            background-color: #ddd;
            background-size: cover;
            background-position: center;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        /* El "Frijolito" o marca */
        .carta.marcada::after {
            content: '🔴'; /* Puedes cambiarlo por un 🫘 o una X */
            font-size: 2rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            padding: 5px;
        }

        .carta.marcada {
            filter: brightness(0.7);
            transform: scale(0.95);
        }

        .controles {
            margin-top: 25px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background-color: #27ae60;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 4px #1e8449;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0px 2px #1e8449;
        }
    </style>
</head>
<body>

    <h1>Mi Lotería Digital</h1>
    
    <div id="tablero" class="tablero">
        <!-- Aquí se generan las 16 cartas -->
    </div>

    <div class="controles">
        <button onclick="generarNuevoTablero()">Generar Nueva Carta</button>
    </div>

    <script>
        /* --- LÓGICA (JAVASCRIPT) --- */

        // 1. Definimos cuántas cartas tienes en total
        const TOTAL_CARTAS_MAZO = 56; 

        function generarNuevoTablero() {
            const contenedor = document.getElementById('tablero');
            contenedor.innerHTML = ''; // Limpiar el tablero anterior

            // 2. Crear una lista de números del 1 al 56
            let numeros = [];
            for (let i = 1; i <= TOTAL_CARTAS_MAZO; i++) {
                numeros.push(i);
            }

            // 3. Barajar los números (Algoritmo Fisher-Yates)
            // Esto asegura que cada jugador tenga un orden distinto
            for (let i = numeros.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numeros[i], numeros[j]] = [numeros[j], numeros[i]];
            }

            // 4. Tomar los primeros 16 números de la lista ya barajada
            const seleccionadas = numeros.slice(0, 16);

            // 5. Crear visualmente las cartas en el HTML
            seleccionadas.forEach(num => {
                const carta = document.createElement('div');
                carta.className = 'carta';
                
                // Aquí usamos el número para cargar tu imagen
                // Ajusta '.jpg' si tus fotos son '.png'
                carta.style.backgroundImage = `url('${num}.jpg')`;

                // Evento para marcar/desmarcar
                carta.onclick = function() {
                    this.classList.toggle('marcada');
                };

                contenedor.appendChild(carta);
            });
        }

        // Ejecutar la función nada más abrir la página
        window.onload = generarNuevoTablero;
    </script>
</body>
</html>
